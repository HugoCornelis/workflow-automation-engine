---
command: feature-testing-workflow builtin grep_commands :all feature
command_tests:
  - description: 'Does a grep for "feature" on the commands of a given target, report the correct workflows?'
    read: |2
          ROLE: 'localuser@localhost'
      
                                                  ROLE: 'docker_source_code'
      
                                                                                          ROLE: 'root@ssh_cd'
      
                                                                                                                                  ROLE: 'tmux_cd'
      
                                                                                                                                                                          ROLE: 'tester@build'
      
      
      WORKFLOW: builtin_configuration_fetch (use --help to see the help page)
          'cd /home/neurospaces/projects/workflow-automation-engine/source/snapshots/master/vigilia/specifications/workflow-configurations/feature-testing '
          'git fetch'
      ---
      END WORKFLOW: builtin_configuration_fetch
      
      WORKFLOW: builtin_configuration_install (use --help to see the help page)
          'mkdir --parents /home/neurospaces/bin'
          'bash -c "echo '# feature-testing-workflow
      
      alias feature-testing-workflow=\"grc feature-testing-workflow\"
      alias feature-testing-configuration=\"grc feature-testing-configuration\"
      ' | cat >>/home/neurospaces/.bashrc"'
          'echo'
          'echo Bash completion can be enabled using:'
          'echo'
          'echo   . ./feature-testing-bash-completion.sh'
          'echo'
          'echo Or/and maybe followed with a command to add or modify a first target, here, for the target named 'source_code':'
          'echo'
          'echo   feature-testing-workflow builtin target_add source_code \"Operations on the source code, such as git checkout, build and installation.\" -- --install-commands-py'
          'echo'
      ---
      END WORKFLOW: builtin_configuration_install
      
      WORKFLOW: builtin_configuration_pull (use --help to see the help page)
          'cd /home/neurospaces/projects/workflow-automation-engine/source/snapshots/master/vigilia/specifications/workflow-configurations/feature-testing '
          'git pull'
      ---
      END WORKFLOW: builtin_configuration_pull
      
      WORKFLOW: builtin_docker_images_build (use --help to see the help page)
          'cd /home/neurospaces/projects/workflow-automation-engine/source/snapshots/master/vigilia/specifications/workflow-configurations/feature-testing '
          'docker build --tag docker_source_code_image --build-arg CACHEBUSTER="$(date +%s)" --build-arg USERNAME=neurospaces --build-arg USERID=1000 --build-arg GID=1000 --build-arg USER_NAME=neurospaces --build-arg USER_ID=1000 --build-arg GROUP_ID=1000  --file feature-testing-configuration-data/dockerfiles/Dockerfile.source_code .'
      ---
      END WORKFLOW: builtin_docker_images_build
      
      WORKFLOW: builtin_manual (use --help to see the help page)
          'echo Internal commands to generate 'feature-testing-manual.rst''
          'cd /home/neurospaces/projects/workflow-automation-engine/source/snapshots/master/vigilia/specifications/workflow-configurations/feature-testing/feature-testing-volatile-data/dynamically-generated-manuals '
          'pandoc 'feature-testing-manual.rst' -o 'feature-testing-manual.pdf' -V geometry:margin=1cm --number-sections'
          'okular 'feature-testing-manual.pdf''
      ---
      END WORKFLOW: builtin_manual
      
      WORKFLOW: examples_sh_sh_array_of_commands
          '/home/neurospaces/projects/workflow-automation-engine/source/snapshots/master/vigilia/specifications/workflow-configurations/feature-testing/feature-testing-commands-data/examples_sh/sh_array_of_commands.sh'
      ---
      END WORKFLOW: examples_sh_sh_array_of_commands
      
      WORKFLOW: examples_sh_sh_remote_execution
          '/home/neurospaces/projects/workflow-automation-engine/source/snapshots/master/vigilia/specifications/workflow-configurations/feature-testing/feature-testing-commands-data/examples_sh/sh_remote_execution.sh'
      ---
      END WORKFLOW: examples_sh_sh_remote_execution
      
      WORKFLOW: examples_sh_sh_single_command
          '/home/neurospaces/projects/workflow-automation-engine/source/snapshots/master/vigilia/specifications/workflow-configurations/feature-testing/feature-testing-commands-data/examples_sh/sh_single_command.sh'
      ---
      END WORKFLOW: examples_sh_sh_single_command
      
      WORKFLOW: features_remote_script_execution
          'cd /home/neurospaces/projects/workflow-automation-engine/source/snapshots/master/vigilia/specifications/workflow-configurations/feature-testing/feature-testing-commands-data '
          'sshpass -p harness scp -pr -o LogLevel=ERROR -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null  scripts/feature-shell-script-remote.sh root@__DOCKER_HOST_IP_ADDRESS__:/tmp/feature-shell-script-remote.sh'
                                                                                          '/tmp/feature-shell-script-remote.sh arg1 arg2'
      ---
      END WORKFLOW: features_remote_script_execution
      
      WORKFLOW: scripts_feature-shell-script-remote
          '/home/neurospaces/projects/workflow-automation-engine/source/snapshots/master/vigilia/specifications/workflow-configurations/feature-testing/feature-testing-commands-data/scripts/feature-shell-script-remote.sh'
      ---
      END WORKFLOW: scripts_feature-shell-script-remote
      
    white_space: convert seen 0a to 0d 0a newlines
description: 'Does a grep for "feature" on the commands of a given target, report the correct workflows?'
