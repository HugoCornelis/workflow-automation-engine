---
command: feature-testing-workflow features --interactions-target --help
command_tests:
  - description: Do we see both help pages and an interaction diagram when using both the --help and the --interactions-target options?
    read: |+2
      
      WORKFLOW: features_annotations
          ROLE: 'localuser@localhost'
      
          'pwd'
          'cd /bin '
          'pwd'
      ---
      END WORKFLOW: features_annotations
      
      feature-testing-workflow features background: <synopsis> and an rst or md formatted help page
      ---
      WORKFLOW: features_background (use --help to see the help page)
      ---
      END WORKFLOW: features_background
      
      ---
      WORKFLOW: features_background_testing
          'echo 'foreground command (1)''
          'echo 'background command''
          'echo 'foreground command (2)''
      ---
      END WORKFLOW: features_background_testing
      
      feature-testing-workflow features cd_tests: Test the 'cd' features.
      
      SYNOPSIS: features cd_tests
      
      This command is used for testing of the internal 'cd' command.
      
      In addition, it is also used for testing of the '--export-help-page' option.
      
      This help page is implemented with the 'features_cd_tests_help' sub.
      This sub documents the command line arguments and options:
      
          ARGV[0]: The directory to which to change.
      
       
      ---
      WORKFLOW: features_cd_tests (use --help to see the help page)
          'pwd'
          'cd bin '
          'pwd'
          'cd .. '
          'pwd'
          'cd / '
          'pwd'
      ---
      END WORKFLOW: features_cd_tests
      
      ---
      WORKFLOW: features_cd_tests_ssh
                                                  ROLE: 'root@ssh_cd'
      
                                                  'pwd'
                                                  'cd /bin '
                                                  'pwd'
                                                  'cd .. '
                                                  'pwd'
                                                  'cd / '
                                                  'pwd'
      ---
      END WORKFLOW: features_cd_tests_ssh
      
      ---
      WORKFLOW: features_cd_tests_tmux
                                                                                          ROLE: 'tmux_cd'
      
                                                                                          'pwd >>/tmp/tmux-pwd.txt'
                                                                                          'cd bin '
                                                                                          'pwd >>/tmp/tmux-pwd.txt'
                                                                                          'cd .. '
                                                                                          'pwd >>/tmp/tmux-pwd.txt'
                                                                                          'cd / '
                                                                                          'pwd >>/tmp/tmux-pwd.txt'
      ---
      END WORKFLOW: features_cd_tests_tmux
      
      ---
      WORKFLOW: features_export_sh
          'pwd'
          'cd /bin '
          'pwd'
                                                  'pwd'
                                                  'cd /bin '
                                                  'pwd'
                                                                                          'pwd'
                                                                                          'cd /bin '
                                                                                          'pwd'
      ---
      END WORKFLOW: features_export_sh
      
      ---
      WORKFLOW: features_export_variables
          'cd /home/neurospaces '
          'echo /some/directory'
          'echo with an unused value'
          'echo SERVER_PASSWORD: a-password-value-is-never-exported'
      ---
      END WORKFLOW: features_export_variables
      
      ---
      WORKFLOW: features_remote_script_execution
          'cd /home/neurospaces/projects/workflow-automation-engine/source/snapshots/master/vigilia/specifications/workflow-configurations/feature-testing/feature-testing-commands-data '
          'sshpass -p harness scp -pr -o LogLevel=ERROR -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null  scripts/feature-shell-script-remote.sh root@__DOCKER_HOST_IP_ADDRESS__:/tmp/feature-shell-script-remote.sh'
                                                  '/tmp/feature-shell-script-remote.sh arg1 arg2'
      ---
      END WORKFLOW: features_remote_script_execution
      
      ---
      WORKFLOW: features_timestamps
          'pwd'
          'pwd'
          'pwd'
      ---
      END WORKFLOW: features_timestamps

    white_space: convert seen 0a to 0d 0a newlines
description: Do we see both help pages and an interaction diagram when using both the --help and the --interactions-target options?
