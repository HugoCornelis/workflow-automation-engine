---
command: cat ./features-export-variables.sh
command_tests:
  - description: Has the file with the commands and variables been created?
    read: |2
      #!/bin/bash
      
      # -e: exit immediately if any command returns a non-zero exit status
      # -u: undefined variable causes the script to exit immediately
      # -o pipefail: a pipeline fails if any command in the pipeline fails
      set -euo pipefail
      
      #
      # script generated with feature-testing-workflow
      #
      # the command line used to generate this script was:
      #
      # /home/neurospaces/bin/feature-testing-workflow features export_variables --export-sh
      #
      
      while [[ ${1-} != "" ]]; do
        case "$1" in
          -d|--dry-run) RUN_DRY_RUN=1; shift ;;
          -h|--help)
            cat <<EOF
      Usage: $(basename "$0") [-h|--help]
      
      
      
      Options:
        -d, --dry-run Do not run commands but show them if verbose is set.
        -h, --help    Show this help
        -v, --verbose Run in verbose mode (display commands as they are executed)
      EOF
            exit 0
            ;;
          -v|--verbose) RUN_VERBOSE=1; shift ;;
          *) echo "Unknown argument: $1"; exit 2 ;;
        esac
      done
      
      
      # running mode defaults
      RUN_VERBOSE=0
      RUN_DRY_RUN=0
      
      
      # run a command, implement RUN_VERBOSE and RUN_DRY_RUN.
      # Usage: do_run_command command arg1 arg2 ...
      do_run_command() {
          if [[ ${RUN_VERBOSE:-0} == 1 ]]; then
              echo "$@"
          fi
      
          if [[ ${RUN_DRY_RUN:-0} == 0 ]]; then
              "$@"
          fi
      }
      
      # --export-role is not set, exporting all roles without a remote policy prefix
      #
      #
      # begin export_sh_variables
      #
      
      A_USED_VARIABLE=${A_USED_VARIABLE:=with an unused value}
      #
      # HOME_DIRECTORY: Your home directory
      HOME_DIRECTORY=${HOME_DIRECTORY:=/home/neurospaces}
      #
      # SERVER_PASSWORD: Variables that have 'password' in their name, may be exported but their value is never exported.  This allows exported scripts to log into remote machines without exposing the credentials to do so.
      SERVER_PASSWORD=${SERVER_PASSWORD:=}
      
      #
      # end export_sh_variables
      #
      
      do_run_command cd $HOME_DIRECTORY
      do_run_command echo /some/directory
      do_run_command echo $A_USED_VARIABLE
      do_run_command echo SERVER_PASSWORD: $SERVER_PASSWORD
    white_space: convert seen 0a to 0d 0a newlines
description: Has the file with the commands and variables been created?
