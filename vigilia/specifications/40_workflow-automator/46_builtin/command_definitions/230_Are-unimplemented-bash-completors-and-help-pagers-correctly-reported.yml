---
command: feature-testing-workflow builtin lint 'python|scripts'
command_tests:
- description: Are unimplemented bash completors and help pagers correctly reported after we have removed the workflow implementation file?
  read: |

    missing_bash_completors:
    - scripts feature-shell-script-remote
    ---
    missing_help_pagers:
    - scripts feature-shell-script-remote
  white_space: convert seen 0a to 0d 0a newlines
description: Are unimplemented bash completors and help pagers correctly reported after we have removed the workflow implementation file?
