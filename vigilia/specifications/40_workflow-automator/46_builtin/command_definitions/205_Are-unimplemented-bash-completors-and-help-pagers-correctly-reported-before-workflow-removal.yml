---
command: feature-testing-workflow builtin lint 'python|scripts'
command_tests:
  - description: Are unimplemented bash completors and help pagers correctly reported?
    read: |2
      
      missing_bash_completors:
        - python python_command_that_fails_at_the_python_level
        - scripts feature-shell-script-remote
      ---
      missing_help_pagers:
        - python python_command_that_fails_at_the_python_level
        - scripts feature-shell-script-remote
    white_space: convert seen 0a to 0d 0a newlines
description: Are unimplemented bash completors and help pagers correctly reported?
