      feature-testing-workflow: *** Running in export_sh mode, exporting: 'cd /bin'
      feature-testing-workflow: *** Running in export_sh mode, exporting: 'pwd'
      feature-testing-workflow: *** Running in export_sh mode, exporting: 'pwd'
      feature-testing-workflow: *** Running in export_sh mode, exporting: 'cd /bin'
      feature-testing-workflow: *** Running in export_sh mode, exporting: 'pwd'
