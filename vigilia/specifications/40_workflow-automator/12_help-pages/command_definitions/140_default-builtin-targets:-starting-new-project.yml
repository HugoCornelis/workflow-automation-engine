---
command: bin/workflow builtin project_start --help
command_tests:
  - description: Do we see the help page for starting a new project?
    read: |
      workflow builtin project_start: start a new project with a given name in the current directory.
      
      This will create a project descriptor, a configuration file and an
      empty command file in the current working directory.
      
      arguments:
      ~~~~~~~~~~
      
          ``ARGV[0]``: name of the new project.
      
      options:
      ~~~~~~~~
      
          ``--minimal``: create only the project descriptor and configuration, without example command files.
      
          ``--perl``: create the Perl example command file.
      
          ``--python``: create the Python example command file.
      
          ``--shell``: create the shell example command file.
      
      When none of ``--minimal``, ``--perl``, ``--python`` or ``--shell`` is given, all example command files are created.
description: 'default builtin targets: starting a new project'
