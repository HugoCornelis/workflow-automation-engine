---
command: cp ./vigilia.config ./vigilia2.config && perl -pi.bak -e 's/return \$config;/return \$config + ;/' ./vigilia2.config && perl -c ./vigilia2.config
command_tests:
  - description: Can we create an invalid vigilia configuration?
    read: |+
      syntax error at ./vigilia2.config line 32, near "+ ;"
      ./vigilia2.config had compilation errors.
    white_space: convert seen 0a to 0d 0a newlines
description: Can we create an invalid vigilia configuration?
